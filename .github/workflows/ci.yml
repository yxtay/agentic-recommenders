name: ci

on:
  push:
    branches: [main]
    tags: ["**"]
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
  workflow_call:
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_name != github.event.repository.default_branch }}

env:
  HF_HOME: /tmp/huggingface
  PROJECT_NAME: agentic_rec
  UV_LOCKED: "1"
  UV_NO_SYNC: "1"

jobs:
  python:
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - if: ${{ github.ref_name != github.event.repository.default_branch }}
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            data
            lance_db
            ${{ env.HF_HOME }}
          key: python-${{ runner.os }}

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - id: setup-python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6

      - run: uv sync && uv pip list

      - run: uv run pytest

      - run: uv run index

      - if: ${{ failure() }}
        run: uv run ml_1m

  docker:
    permissions:
      contents: read
      packages: write

    runs-on: ubuntu-latest
    env:
      GHCR_IMAGE_NAME: ghcr.io/${{ github.repository }}
      DOCKER_RUN_CMD: >-
        docker run --env HF_HOME=/tmp/huggingface -v data:/work/app/data -v lance-db:/work/app/lance_db -v hf-home:/tmp/huggingface
    steps:
      - if: ${{ github.ref_name != github.event.repository.default_branch }}
        uses: BYK/docker-volume-cache-action/restore@0efa5cf5178c9906cb46ed8d1a357df8fd6b1a06 # main
        with:
          key: docker-volumes-${{ runner.os }}
          volumes: |
            data
            lance-db
            hf-home

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          cache-from: ${{ env.GHCR_IMAGE_NAME }}:cache
          load: true

      - run: ${DOCKER_RUN_CMD} --user root "${IMAGE_ID}" chown -R 1000:1000 /work/app/data /work/app/lance_db /tmp/huggingface
        env:
          IMAGE_ID: ${{ steps.build.outputs.imageid }}

      - run: ${DOCKER_RUN_CMD} "${IMAGE_ID}" uv pip list
        env:
          IMAGE_ID: ${{ steps.build.outputs.imageid }}

      - run: ${DOCKER_RUN_CMD} --env "CEREBRAS_API_KEY=${CEREBRAS_API_KEY}" "${IMAGE_ID}" uv run app
        id: run-app
        continue-on-error: true
        env:
          IMAGE_ID: ${{ steps.build.outputs.imageid }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}

      - if: ${{ steps.run-app.outcome == 'failure' }}
        run: ${DOCKER_RUN_CMD} --env "CEREBRAS_API_KEY=${CEREBRAS_API_KEY}" "${IMAGE_ID}" uv run app
        id: run-agent
        continue-on-error: true
        env:
          IMAGE_ID: ${{ steps.build.outputs.imageid }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}

      - if: ${{ steps.run-agent.outcome == 'failure' }}
        run: ${DOCKER_RUN_CMD} "${IMAGE_ID}" uv run index
        env:
          IMAGE_ID: ${{ steps.build.outputs.imageid }}

      - if: ${{ failure() }}
        run: ${DOCKER_RUN_CMD} "${IMAGE_ID}" uv run ml_1m
        env:
          IMAGE_ID: ${{ steps.build.outputs.imageid }}

      - if: ${{ github.ref_name != github.event.repository.default_branch }}
        uses: BYK/docker-volume-cache-action/save@0efa5cf5178c9906cb46ed8d1a357df8fd6b1a06 # main
        with:
          key: docker-volumes-${{ runner.os }}
          volumes: |
            data
            lance-db
            hf-home

      - id: docker_metadata
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.GHCR_IMAGE_NAME }}

      - if: ${{ github.event_name == 'push' || github.ref_name == github.event.repository.default_branch }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - if: ${{ github.event_name == 'push' || github.ref_name == github.event.repository.default_branch }}
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          cache-from: ${{ env.GHCR_IMAGE_NAME }}:cache
          cache-to: type=registry,ref=${{ env.GHCR_IMAGE_NAME }}:cache,mode=max
          tags: ${{ steps.docker_metadata.outputs.tags }}
          labels: ${{ steps.docker_metadata.outputs.labels }}
          annotations: ${{ steps.docker_metadata.outputs.annotations }}
          push: ${{ github.event_name == 'push' || github.ref_name == github.event.repository.default_branch }}
